name: CI — Quality Gates

on:
  push:
    branches: [main, changedDB]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────
  # JOB 1: Code Quality — Ruff, Bandit, Safety, MyPy
  # ─────────────────────────────────────────────────────
  quality:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff — lint and import sort
        run: ruff check .

      - name: Bandit — security scan
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            --exit-zero
          bandit -r app/ -ll

      - name: Safety — dependency CVE check
        run: safety check --full-report
        continue-on-error: true

      - name: MyPy — type checking
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ─────────────────────────────────────────────────────
  # JOB 2: Tests — migrate, seed, integration + coverage
  # ─────────────────────────────────────────────────────
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cart_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cart_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Run database migrations
        run: alembic upgrade head

      - name: Seed test data
        run: python seed_db.py

      - name: Start API server in background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 20); do
            curl -s http://localhost:8000/docs > /dev/null && echo "Server ready" && break
            sleep 2
          done

      - name: Set up Node.js for Newman
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman integration tests
        run: |
          newman run postman/collections/cart_api_tests.postman_collection.json \
            --reporters cli \
            --reporter-cli-no-banner

  # ─────────────────────────────────────────────────────
  # JOB 3: SonarCloud — code quality gate
  # Runs only when SONAR_TOKEN secret is set
  # ─────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Download Bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────
  # JOB 4: Docker — build and push to DockerHub
  # Runs only on push to main (not PRs) and if all prior jobs pass
  # ─────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check DockerHub secrets are configured
        id: docker-check
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::warning::DockerHub secrets not set — skipping Docker push."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.docker-check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.docker-check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.docker-check.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cart-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cart-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
