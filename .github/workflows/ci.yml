name: CI/CD — Test, Lint, and Blue-Green Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────
  # JOB 1: CI — lint, migrate, seed, test
  # ─────────────────────────────────────────
  ci:
    name: CI — Lint and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cart_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cart_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run code quality check (Ruff)
        run: ruff check .

      - name: Run database migrations
        run: alembic upgrade head

      - name: Seed test data
        run: python seed_db.py

      - name: Start API server in background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 15); do
            curl -s http://localhost:8000/docs > /dev/null && echo "Server is up" && break
            sleep 1
          done

      - name: Set up Node.js for Newman
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests with Newman
        run: |
          newman run postman/collections/cart_api_tests.postman_collection.json \
            --reporters cli \
            --reporter-cli-no-banner

  # ─────────────────────────────────────────
  # JOB 2: CD — Blue-Green Deploy to Render
  # Runs only on push to main (not on PRs)
  # Requires CI job to pass first
  # ─────────────────────────────────────────
  deploy:
    name: CD — Blue-Green Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Validate Render deployment configuration
        id: deploy_config
        run: |
          missing=()
          [ -z "${{ secrets.RENDER_URL_BLUE }}" ] && missing+=("RENDER_URL_BLUE")
          [ -z "${{ secrets.RENDER_URL_GREEN }}" ] && missing+=("RENDER_URL_GREEN")
          [ -z "${{ secrets.RENDER_DEPLOY_HOOK_BLUE }}" ] && missing+=("RENDER_DEPLOY_HOOK_BLUE")
          [ -z "${{ secrets.RENDER_DEPLOY_HOOK_GREEN }}" ] && missing+=("RENDER_DEPLOY_HOOK_GREEN")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Skipping blue-green deploy because required secrets are missing: ${missing[*]}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Identify active slot (blue vs green)
        id: slots
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          BLUE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "${{ secrets.RENDER_URL_BLUE }}/docs" || echo "000")
          GREEN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "${{ secrets.RENDER_URL_GREEN }}/docs" || echo "000")

          echo "Blue HTTP: $BLUE_STATUS | Green HTTP: $GREEN_STATUS"

          if [ "$BLUE_STATUS" == "200" ]; then
            echo "active_slot=blue"    >> $GITHUB_OUTPUT
            echo "inactive_slot=green" >> $GITHUB_OUTPUT
            echo "deploy_hook=${{ secrets.RENDER_DEPLOY_HOOK_GREEN }}" >> $GITHUB_OUTPUT
            echo "inactive_url=${{ secrets.RENDER_URL_GREEN }}"        >> $GITHUB_OUTPUT
          else
            echo "active_slot=green"  >> $GITHUB_OUTPUT
            echo "inactive_slot=blue" >> $GITHUB_OUTPUT
            echo "deploy_hook=${{ secrets.RENDER_DEPLOY_HOOK_BLUE }}" >> $GITHUB_OUTPUT
            echo "inactive_url=${{ secrets.RENDER_URL_BLUE }}"        >> $GITHUB_OUTPUT
          fi

      - name: Deploy to ${{ steps.slots.outputs.inactive_slot }} slot
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          echo "Active slot  : ${{ steps.slots.outputs.active_slot }}   (serving live traffic)"
          echo "Deploying to : ${{ steps.slots.outputs.inactive_slot }} (users not affected yet)"
          curl -s -X POST "${{ steps.slots.outputs.deploy_hook }}"
          echo "Deploy triggered on ${{ steps.slots.outputs.inactive_slot }}"

      - name: Wait for ${{ steps.slots.outputs.inactive_slot }} to be ready
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          echo "Waiting for new slot to spin up (max 5 minutes)..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "${{ steps.slots.outputs.inactive_url }}/docs" || echo "000")
            echo "  attempt $i/20 → HTTP $STATUS"
            if [ "$STATUS" == "200" ]; then
              echo "New slot is up!"
              exit 0
            fi
            sleep 15
          done
          echo "New slot never became healthy — rollback: keeping ${{ steps.slots.outputs.active_slot }} live"
          exit 1

      - name: Smoke test on ${{ steps.slots.outputs.inactive_slot }}
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ steps.slots.outputs.inactive_url }}/carts" \
            -H "Content-Type: application/json" \
            -d '{"user_id": 999}')
          echo "Smoke test → POST /carts {user_id:999} returned HTTP $STATUS (expect 404)"
          if [ "$STATUS" == "404" ]; then
            echo "Smoke test passed — API is responding correctly"
          else
            echo "Smoke test FAILED — rollback: ${{ steps.slots.outputs.active_slot }} remains live"
            exit 1
          fi

      - name: Promote ${{ steps.slots.outputs.inactive_slot }} to active
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          echo "──────────────────────────────────────────"
          echo "Blue-Green switch complete!"
          echo "  NEW  active  : ${{ steps.slots.outputs.inactive_slot }}"
          echo "  NEW  standby : ${{ steps.slots.outputs.active_slot }}"
          echo "  Live URL     : ${{ steps.slots.outputs.inactive_url }}"
          echo "──────────────────────────────────────────"
