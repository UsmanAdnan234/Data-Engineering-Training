name: Deploy ETL — Airflow EC2

on:
  push:
    branches: [main]
    paths:
      - 'etl/**'
      - '.github/workflows/deploy-etl.yml'
  workflow_dispatch:

# Required GitHub Secrets:
#   ETL_EC2_HOST          — Public IP of Airflow EC2 (16.171.151.249)
#   EC2_USER              — SSH user (ubuntu)
#   EC2_SSH_PRIVATE_KEY   — PEM key contents (same key used for blue/green)

jobs:
  deploy-etl:
    name: Sync ETL files & restart Airflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H "${{ secrets.ETL_EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync ETL files to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -r \
            ./etl/dags ./etl/scripts ./etl/docker-compose.airflow.yml ./etl/Dockerfile.airflow \
            "${{ secrets.EC2_USER }}@${{ secrets.ETL_EC2_HOST }}:~/etl/"

      - name: Check if Dockerfile.airflow changed
        id: dockerfile
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "etl/Dockerfile.airflow"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Dockerfile.airflow changed — full rebuild required"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Dockerfile.airflow unchanged — skipping rebuild"
          fi

      - name: Rebuild Airflow image (Dockerfile changed)
        if: steps.dockerfile.outputs.changed == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            "${{ secrets.EC2_USER }}@${{ secrets.ETL_EC2_HOST }}" \
            "cd ~/etl && docker-compose -f docker-compose.airflow.yml build --no-cache"

      - name: Write .env file on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            "${{ secrets.EC2_USER }}@${{ secrets.ETL_EC2_HOST }}" bash << EOF
          cat > ~/etl/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION=eu-north-1
          S3_BUCKET=cart-api-datalake
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          ENVEOF
          EOF

      - name: Restart Airflow containers
        run: |
          ssh -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            "${{ secrets.EC2_USER }}@${{ secrets.ETL_EC2_HOST }}" \
            "cd ~/etl && docker-compose -f docker-compose.airflow.yml down && docker-compose -f docker-compose.airflow.yml up -d"

      - name: Verify Airflow is running
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "http://${{ secrets.ETL_EC2_HOST }}:8080/health" || echo "000")
          echo "Airflow health → HTTP $STATUS"
          [ "$STATUS" == "200" ] || { echo "::warning::Airflow health check returned $STATUS — check containers manually"; }

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key.pem
