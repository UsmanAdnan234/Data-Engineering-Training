services:
  - type: web
    name: cart-api
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cart-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: cart-db
    databaseName: cart_db
    user: cart_user
    plan: free
